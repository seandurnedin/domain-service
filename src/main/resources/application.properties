server.port=8081

spring.application.name=domain-service

# Datasource
spring.datasource.url=jdbc:mysql://localhost:3306/library_app?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:admin}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
# ddl-auto=update is fine for local first instantiation/ schema changes
# ddl-auto=create drops existing tables and create new tables (all data is lost on each run)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Spring Data REST
spring.data.rest.base-path=/api
spring.data.rest.default-page-size=20
spring.data.rest.max-page-size=100

management.endpoints.web.exposure.include=health,info

spring.threads.virtual.enabled=true

logging.level.com.libraryapp.domain=INFO

# One-time startup data seed (sample books + an admin and a manager user) - off by default.
# Flip to true (or set DATA_SEED_ENABLED=true) the first time you run against a fresh database;
# safe to leave on across restarts, the seeder skips itself once users/books already exist.
app.data-seed.enabled=${DATA_SEED_ENABLED:true}
app.data-seed.admin-username=${SEED_ADMIN_USERNAME:admin}
app.data-seed.admin-email=${SEED_ADMIN_EMAIL:admin@libraryapp.com}
app.data-seed.admin-password=${SEED_ADMIN_PASSWORD:ChangeMe123!}
app.data-seed.manager-username=${SEED_MANAGER_USERNAME:manager}
app.data-seed.manager-email=${SEED_MANAGER_EMAIL:manager@libraryapp.com}
app.data-seed.manager-password=${SEED_MANAGER_PASSWORD:ChangeMe123!}
